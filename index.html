<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مُصمم جداول الإكسيل والـ PDF السريع</title>
    
    <!-- مكتبات توليد الـ PDF ودعم الخطوط -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <!-- ربط ملف الستايل الخارجي -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Excel & PDF Table Generator 📊</h2>
    <hr>

    <!-- الخطوة 1: تحديد بنية الجدول -->
    <div id="step1" class="step active">
        <label>شنو بغيتي تسمي فتنظيم الجدول ديالك؟</label>
        <select id="structureType">
            <option value="cols">الأعمدة فقط (Columns) - كفما شرحتي فالمثال</option>
            <option value="rows">السطور فقط (Rows)</option>
            <option value="both">الأعمدة والسطور معاً (Columns & Rows)</option>
        </select>
        <button onclick="goToStep2()">التالي ➔</button>
    </div>

    <!-- الخطوة 2: تحديد العدد والأسماء -->
    <div id="step2" class="step">
        <div id="inputsContainer"></div>
        <button onclick="goToStep3()">إنشاء جدول البيانات ➔</button>
    </div>

    <!-- الخطوة 3: إدخال البيانات وتصدير الملفات -->
    <div id="step3" class="step">
        <h3>تعمير معطيات الجدول</h3>
        <p class="hint-text">عمر السطور بالمعلومات لي عندك، وتقدر تزيد شحال ما بغيتي ديال السطور.</p>
        <div class="table-responsive">
            <table id="dataTable">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <br>
        <button class="btn-add" onclick="addNewRow()">➕ زيادة سطر جديد</button>
        
        <div class="export-buttons-group">
            <button class="btn-export" onclick="exportToExcelNative()">📥 تحميل ملف Excel (CSV)</button>
            <button class="btn-pdf" onclick="exportToPDF()">📥 تحميل ملف PDF واجد</button>
        </div>
    </div>
</div>

<!-- ربط ملف الجافاسكريبت الخارجي -->
<script src="script.js"></script>
</body>
</html>
