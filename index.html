<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مُصمم جداول الإكسيل السريع | Excel Table Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Excel Table Generator 📊</h2>
    <hr>

    <div id="step1" class="step active">
        <label>شنو بغيتي تسمي فتنظيم الجدول ديالك؟</label>
        <select id="structureType">
            <option value="cols">الأعمدة فقط (Columns) - كفما شرحتي فالمثال</option>
            <option value="rows">السطور فقط (Rows)</option>
            <option value="both">الأعمدة والسطور معاً (Columns & Rows)</option>
        </select>
        <button onclick="goToStep2()">التالي ➔</button>
    </div>

    <div id="step2" class="step">
        <div id="inputsContainer"></div>
        <button onclick="goToStep3()">إنشاء جدول البيانات ➔</button>
    </div>

    <div id="step3" class="step">
        <h3>تعمير معطيات الجدول</h3>
        <p class="hint-text">عمر السطور بالمعلومات لي عندك، وتقدر تزيد شحال ما بغيتي ديال السطور.</p>
        <div class="table-responsive">
            <table id="dataTable">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <br>
        <button class="btn-add" onclick="addNewRow()">➕ زيادة سطر جديد</button>
        <button class="btn-export" onclick="exportToExcelNative()">📥 تحميل ملف Excel (CSV)</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
